<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UFC Mention Markets</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="mark" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M2 12.5 L6.5 7.5 L9.5 10 L16 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="16" cy="3" r="1.7" fill="currentColor"/>
            </svg>
          </span>
          <div>
            <h1>UFC mention markets</h1>
            <p class="lede" id="countsLine">Loading…</p>
          </div>
        </div>
        <div class="status-wrap">
          <div class="status" id="dataStatus">Loading local data</div>
          <button class="refresh-button" id="refreshButton" type="button">Update now</button>
        </div>
      </header>

      <div class="layout">
        <aside class="sidebar" aria-label="Cards and fights">
          <p class="side-title">Upcoming cards</p>
          <nav id="cardNav"></nav>
        </aside>

        <section class="content">
          <div class="fight-header" id="fightHeader"></div>

          <div class="toolbar">
            <select id="phraseFilter" aria-label="Filter by phrase">
              <option value="">All phrases</option>
            </select>
            <input id="searchInput" type="search" placeholder="Search fighter, phrase, market" aria-label="Search">
            <span class="toolbar-meta" id="tableMeta"></span>
          </div>

          <div class="panel">
            <div class="table-wrap">
              <table id="dataTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
              </table>
            </div>
          </div>

          <details class="fold" id="healthFold">
            <summary>
              <span class="fold-label">Model health</span>
              <span class="fold-summary" id="healthSummary"></span>
            </summary>
            <div class="health-grid" id="healthGrid"></div>
          </details>

          <details class="fold" id="trackingFold">
            <summary>
              <span class="fold-label">Paper tracking</span>
              <span class="fold-summary" id="trackingSummary"></span>
            </summary>
            <div class="fold-body">
              <div class="tracking-grid" id="trackingCards"></div>
              <div class="table-wrap">
                <table class="tracking-table" id="trackingTable">
                  <thead>
                    <tr>
                      <th>Type</th>
                      <th>Fight</th>
                      <th>Phrase</th>
                      <th>Side</th>
                      <th class="num">Price</th>
                      <th class="num">Edge</th>
                      <th>Outcome</th>
                    </tr>
                  </thead>
                  <tbody id="trackingBody"></tbody>
                </table>
              </div>
            </div>
          </details>
        </section>
      </div>
    </main>

    <script>
      const cacheBust = Date.now().toString();
      const dataScript = document.createElement("script");
      dataScript.src = `data.js?v=${cacheBust}`;
      dataScript.onload = () => {
        const appScript = document.createElement("script");
        appScript.src = `app.js?v=${cacheBust}`;
        document.body.appendChild(appScript);
      };
      document.body.appendChild(dataScript);
    </script>
  </body>
</html>
