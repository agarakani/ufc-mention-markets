<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UFC Mention Markets</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="mark" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M2 12.5 L6.5 7.5 L9.5 10 L16 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="16" cy="3" r="1.7" fill="currentColor"/>
            </svg>
          </span>
          <div>
            <p class="eyebrow">UFC mention markets</p>
            <h1>Fight phrase board</h1>
            <p class="lede">Fight-by-fight prices for the exact phrases Kalshi lists.</p>
          </div>
        </div>
        <div class="status-wrap">
          <span class="live-dot" aria-hidden="true"></span>
          <div class="status" id="dataStatus">Loading local data</div>
        </div>
      </header>

      <section class="stats" id="stats"></section>

      <section class="controls" aria-label="Dashboard controls">
        <label class="field">
          <span>Phrase</span>
          <select id="phraseFilter">
            <option value="">All phrases</option>
          </select>
        </label>
        <label class="field search">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="fighter, phrase, market">
        </label>
      </section>

      <section class="kalshi-cards" id="kalshiCards" aria-label="Upcoming Kalshi fights"></section>

      <section class="panel tracking-panel">
        <div class="panel-head">
          <div>
            <h2>Paper tracking</h2>
            <p id="trackingMeta">Weekly model tracking will appear here after you save a card.</p>
          </div>
        </div>
        <div class="tracking-grid" id="trackingCards"></div>
        <div class="table-wrap tracking-table-wrap">
          <table id="trackingTable">
            <thead>
              <tr>
                <th>Type</th>
                <th>Card</th>
                <th>Fight</th>
                <th>Phrase</th>
                <th>Entry</th>
                <th>Side</th>
                <th class="num">Price</th>
                <th class="num">Edge</th>
                <th>Outcome</th>
              </tr>
            </thead>
            <tbody id="trackingBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2 id="tableTitle">Live fight prices</h2>
            <p id="tableMeta"></p>
          </div>
        </div>
        <div class="table-wrap">
          <table id="dataTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
